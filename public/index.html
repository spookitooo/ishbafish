<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ئاڵوگۆڕی دراو - پلاتفۆرمی ئاڵوگۆڕی دراو">
    <title>ئاڵوگۆڕی دراو | Exchange Money</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zain:wght@200;300;400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/i18n.js"></script>
    <script src="/js/app.js"></script>
    <script>
        // Redirect based on auth state
        document.addEventListener('DOMContentLoaded', () => {
            if (isLoggedIn()) {
                const user = getUser();
                if (user && user.role === 'admin') {
                    window.location.href = '/admin';
                } else {
                    window.location.href = '/exchange';
                }
            } else {
                window.location.href = '/login';
            }
        });
    </script>
</head>
<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="auth-page">
        <div style="text-align:center; color: var(--text-muted);">
            <div class="spinner" style="width:40px;height:40px;border:3px solid var(--border-color);border-top-color:var(--accent-primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;"></div>
            <p data-i18n="loading">چاوەڕوانبە...</p>
        </div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body>
</html>
