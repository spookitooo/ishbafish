<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a1a">
    <title>مێژوو | Exchange Money</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zain:wght@200;300;400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <nav class="main-nav" id="main-nav"></nav>

    <nav class="mobile-nav">
        <div class="mobile-nav-links">
            <a href="/exchange" class="mobile-nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
                <span data-i18n="nav_exchange">ئاڵوگۆڕ</span>
            </a>
            <a href="/history" class="mobile-nav-link active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                <span data-i18n="nav_history">مێژوو</span>
            </a>
        </div>
    </nav>

    <div class="page-container">
        <div class="page-header">
            <h2 data-i18n="history_title">مێژووی مامەڵەکان</h2>
            <p data-i18n="history_subtitle">هەموو مامەڵەکانت لێرە ببینە</p>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="user-stats">
            <div class="stat-card">
                <div class="stat-label" data-i18n="total_transactions">کۆی مامەڵەکان</div>
                <div class="stat-value gradient" id="stat-total">0</div>
            </div>
            <div class="stat-card" style="--stat-color: var(--color-pending)">
                <div class="stat-label" data-i18n="pending">چاوەڕوان</div>
                <div class="stat-value" id="stat-pending" style="color: var(--color-pending)">0</div>
            </div>
            <div class="stat-card" style="--stat-color: var(--color-completed)">
                <div class="stat-label" data-i18n="completed">تەواوبوو</div>
                <div class="stat-value" id="stat-completed" style="color: var(--color-completed)">0</div>
            </div>
            <div class="stat-card" style="--stat-color: var(--color-rejected)">
                <div class="stat-label" data-i18n="rejected">ڕەتکراوە</div>
                <div class="stat-value" id="stat-rejected" style="color: var(--color-rejected)">0</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filter-bar" id="filter-bar">
            <button class="filter-btn active" data-status="" onclick="filterTransactions(this, '')"><span data-i18n="filter_all">هەمووی</span></button>
            <button class="filter-btn" data-status="pending" onclick="filterTransactions(this, 'pending')"><span data-i18n="pending">چاوەڕوان</span></button>
            <button class="filter-btn" data-status="approved" onclick="filterTransactions(this, 'approved')"><span data-i18n="approved">پەسەندکراو</span></button>
            <button class="filter-btn" data-status="completed" onclick="filterTransactions(this, 'completed')"><span data-i18n="completed">تەواوبوو</span></button>
            <button class="filter-btn" data-status="rejected" onclick="filterTransactions(this, 'rejected')"><span data-i18n="rejected">ڕەتکراوە</span></button>
        </div>

        <!-- Transaction List -->
        <div id="transaction-list" class="transaction-list"></div>
    </div>

    <script src="/js/i18n.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/history.js"></script>
</body>
</html>
