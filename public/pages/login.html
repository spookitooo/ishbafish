<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>چوونەژوورەوە | Exchange Money</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zain:wght@200;300;400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <div class="auth-page">
        <div class="auth-card" id="login-card">
            <!-- Language Switcher -->
            <div class="auth-lang-switcher">
                <div class="lang-switcher">
                    <button class="lang-btn" data-lang="ku" onclick="setLang('ku'); updateLoginPage();">کوردی</button>
                    <button class="lang-btn" data-lang="en" onclick="setLang('en'); updateLoginPage();">EN</button>
                    <button class="lang-btn" data-lang="ar" onclick="setLang('ar'); updateLoginPage();">عربی</button>
                </div>
            </div>

            <!-- Logo -->
            <div class="auth-logo">
                <div class="auth-logo-icon">
                    <svg width="36" height="36" viewBox="0 0 32 32" fill="none">
                        <circle cx="16" cy="16" r="14" stroke="url(#loginGrad)" stroke-width="2.5"/>
                        <path d="M10 16h12M16 10v12" stroke="url(#loginGrad)" stroke-width="2" stroke-linecap="round"/>
                        <defs><linearGradient id="loginGrad" x1="0" y1="0" x2="32" y2="32"><stop offset="0%" stop-color="#6C63FF"/><stop offset="100%" stop-color="#F857A6"/></linearGradient></defs>
                    </svg>
                </div>
                <h1 data-i18n="app_name">ئاڵوگۆڕی دراو</h1>
                <p data-i18n="welcome_back">بەخێربێیتەوە</p>
            </div>

            <!-- Login Form -->
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" data-i18n="email">ئیمەیڵ</label>
                    <input type="email" id="login-email" class="form-input" data-i18n-placeholder="email" placeholder="ئیمەیڵ" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="password">وشەی نهێنی</label>
                    <input type="password" id="login-password" class="form-input" data-i18n-placeholder="password" placeholder="وشەی نهێنی" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="login-submit-btn">
                    <span data-i18n="login_btn">بچۆ ژوورەوە</span>
                </button>
            </form>

            <div class="auth-footer">
                <span data-i18n="no_account">هەژمارت نییە؟</span>
                <a href="/register" data-i18n="create_account">هەژمار دروست بکە</a>
            </div>
        </div>
    </div>

    <script src="/js/i18n.js"></script>
    <script src="/js/app.js"></script>
    <script>
        // Redirect if already logged in
        if (isLoggedIn()) {
            window.location.href = '/exchange';
        }

        function updateLoginPage() {
            applyLanguage();
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('login-submit-btn');
            btn.disabled = true;

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const data = await api('/auth/login', {
                    method: 'POST',
                    body: { email, password }
                });

                if (data) {
                    setAuth(data.token, data.user);
                    if (data.user.language) {
                        setLang(data.user.language);
                    }
                    showToast(t('success'), 'success');
                    setTimeout(() => {
                        if (data.user.role === 'admin') {
                            window.location.href = '/admin';
                        } else {
                            window.location.href = '/exchange';
                        }
                    }, 500);
                }
            } catch (err) {
                showToast(err.message || t('error'), 'error');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
