<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تۆمارکردن | Exchange Money</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zain:wght@200;300;400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-lang-switcher">
                <div class="lang-switcher">
                    <button class="lang-btn" data-lang="ku" onclick="setLang('ku'); applyLanguage();">کوردی</button>
                    <button class="lang-btn" data-lang="en" onclick="setLang('en'); applyLanguage();">EN</button>
                    <button class="lang-btn" data-lang="ar" onclick="setLang('ar'); applyLanguage();">عربی</button>
                </div>
            </div>

            <div class="auth-logo">
                <div class="auth-logo-icon">
                    <svg width="36" height="36" viewBox="0 0 32 32" fill="none">
                        <circle cx="16" cy="16" r="14" stroke="url(#regGrad)" stroke-width="2.5"/>
                        <path d="M10 16h12M16 10v12" stroke="url(#regGrad)" stroke-width="2" stroke-linecap="round"/>
                        <defs><linearGradient id="regGrad" x1="0" y1="0" x2="32" y2="32"><stop offset="0%" stop-color="#6C63FF"/><stop offset="100%" stop-color="#F857A6"/></linearGradient></defs>
                    </svg>
                </div>
                <h1 data-i18n="app_name">ئاڵوگۆڕی دراو</h1>
                <p data-i18n="create_new_account">هەژماری نوێ دروست بکە</p>
            </div>

            <form id="register-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label" data-i18n="full_name">ناوی تەواو</label>
                    <input type="text" id="reg-name" class="form-input" data-i18n-placeholder="full_name" placeholder="ناوی تەواو" required>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="email">ئیمەیڵ</label>
                    <input type="email" id="reg-email" class="form-input" data-i18n-placeholder="email" placeholder="ئیمەیڵ" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="password">وشەی نهێنی</label>
                    <input type="password" id="reg-password" class="form-input" data-i18n-placeholder="password" placeholder="وشەی نهێنی" required minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="confirm_password">دووبارەکردنەوەی وشەی نهێنی</label>
                    <input type="password" id="reg-confirm" class="form-input" data-i18n-placeholder="confirm_password" placeholder="دووبارەکردنەوەی وشەی نهێنی" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="reg-submit-btn">
                    <span data-i18n="register_btn">تۆمار بکە</span>
                </button>
            </form>

            <div class="auth-footer">
                <span data-i18n="have_account">هەژمارت هەیە؟</span>
                <a href="/login" data-i18n="login_here">لێرە بچۆ ژوورەوە</a>
            </div>
        </div>
    </div>

    <script src="/js/i18n.js"></script>
    <script src="/js/app.js"></script>
    <script>
        if (isLoggedIn()) window.location.href = '/exchange';

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('reg-submit-btn');
            
            const full_name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;

            if (password !== confirm) {
                showToast(t('password_mismatch'), 'error');
                return;
            }

            btn.disabled = true;

            try {
                const data = await api('/auth/register', {
                    method: 'POST',
                    body: { full_name, email, password, language: getLang() }
                });

                if (data) {
                    setAuth(data.token, data.user);
                    showToast(t('success'), 'success');
                    setTimeout(() => { window.location.href = '/exchange'; }, 500);
                }
            } catch (err) {
                showToast(err.message || t('error'), 'error');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
